<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Louvor Ipanema</title>

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Louvor Ipanema">
    <link rel="apple-touch-icon" href="https://img.icons8.com/color/512/music-notation.png">

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; }
    </style>
</head>
<body>

<div id="menu-lateral" style="position: fixed; top: 0; left: -250px; width: 250px; height: 100%; background: #002366; z-index: 1000; transition: 0.3s; padding-top: 60px; color: white; font-family: sans-serif;">
    <button onclick="fecharMenu()" style="background:none; border:none; color:white; font-size: 1.5em; position: absolute; top: 20px; right: 20px;">✕</button>
    <ul style="list-style: none; padding: 0;">
        <li onclick="irPara('repertorio')" style="padding: 20px; border-bottom: 1px solid #004080; cursor: pointer;">🎵 Repertório</li>
    </ul>
</div>

<div id="tela-login" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #FFFFFF; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; font-family: sans-serif;">
    <h1 style="color: #002366; margin-bottom: 30px;">LOUVOR IPANEMA</h1>
    
    <div style="width: 80%; max-width: 300px; margin-bottom: 15px;">
        <input type="email" id="login-nome" placeholder="Seu E-mail" style="padding: 15px; border: 1px solid #002366; border-radius: 8px; width: 100%; background: #F8F9FA; font-size: 16px; box-sizing: border-box; outline: none;">
    </div>
    
    <div style="position: relative; width: 80%; max-width: 300px; margin-bottom: 20px;">
        <input type="password" id="login-senha" placeholder="Sua Senha" style="padding: 15px; border: 1px solid #002366; border-radius: 8px; width: 100%; background: #F8F9FA; font-size: 16px; box-sizing: border-box; outline: none;">
        
        <div onclick="toggleSenha()" style="position: absolute; right: 12px; top: 50%; transform: translateY(-50%); cursor: pointer; display: flex; align-items: center; justify-content: center; width: 30px; height: 30px;">
            <svg id="icone-olho" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#002366" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
            </svg>
        </div>
    </div>

    <button onclick="verificarAcesso()" style="background: #002366; color: white; border: none; padding: 15px 40px; border-radius: 8px; font-weight: bold; width: 80%; max-width: 300px; cursor: pointer;">ENTRAR</button>
    <p id="msg-erro" style="color: #ff4444; margin-top: 15px; display: none; font-weight: bold;">⚠️ E-mail ou Senha incorretos!</p>
</div>

<div id="sistema-principal" style="display: none; font-family: sans-serif;">
    <header style="background: #002366; color: white; padding: 20px; text-align: center; position: relative;">
        <div onclick="abrirMenu()" style="position: absolute; top: 25px; left: 20px; cursor: pointer;">
            <div style="width: 25px; height: 3px; background: white; margin: 5px 0;"></div>
            <div style="width: 25px; height: 3px; background: white; margin: 5px 0;"></div>
            <div style="width: 25px; height: 3px; background: white; margin: 5px 0;"></div>
        </div>
        <h1 style="margin: 0; font-size: 1.5em;">LOUVOR IPANEMA</h1>
    </header>
    <div style="padding: 20px;">
        <h2 id="texto-boas-vindas" style="color: #002366;">Olá! 👋</h2>
    </div>
</div>

<script type="module">
    // 1. IMPORTAR FIREBASE (Lembre de manter isso!)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    // 2. CONFIGURAÇÃO (Use a sua do print)
    const firebaseConfig = {
        apiKey: "SUA_API_KEY",
        authDomain: "louvor-ipanema.firebaseapp.com",
        projectId: "louvor-ipanema",
        storageBucket: "louvor-ipanema.firebasestorage.app",
        messagingSenderId: "501679613996",
        appId: "SUO_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // 3. FUNÇÕES
    window.verificarAcesso = function() {
        const email = document.getElementById('login-nome').value.trim();
        const senha = document.getElementById('login-senha').value;
        const msgErro = document.getElementById('msg-erro');

        signInWithEmailAndPassword(auth, email, senha)
            .then(() => {
                document.getElementById('tela-login').style.display = 'none';
                document.getElementById('sistema-principal').style.display = 'block';
            })
            .catch(() => {
                msgErro.style.display = 'block';
            });
    };

    window.toggleSenha = function() {
        const campoSenha = document.getElementById('login-senha');
        const icone = document.getElementById('icone-olho');
        if (campoSenha.type === "password") {
            campoSenha.type = "text";
        } else {
            campoSenha.type = "password";
        }
    };

    window.abrirMenu = () => document.getElementById('menu-lateral').style.left = "0px";
    window.fecharMenu = () => document.getElementById('menu-lateral').style.left = "-250px";
</script>

</body>
</html>
